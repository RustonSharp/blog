name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate posts index
        run: python3 scripts/generate_posts.py

      - name: Ensure posts.json is up to date
        run: git diff --exit-code data/posts.json

      - name: Check JavaScript syntax
        run: |
          node --check assets/js/main.js
          node --check assets/js/shared.js
          node --check assets/js/home.js

      - name: Lint Markdown
        run: npx -y markdownlint-cli "README*.md" "posts/*.md"
