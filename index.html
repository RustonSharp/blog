<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="MISTISLE 博客，记录设计哲学、技术实践与深度思考。"/>
    <title>MISTISLE</title>
    <link rel="stylesheet" href="./assets/css/style.css"/>
    <link rel="stylesheet" href="./assets/css/theme-terminal.css"/>
    <script type="module" src="./assets/js/main.js"></script>
</head>
<body>
    <div class="app-container">
        <main class="main-container">
            <header class="home-terminal-header" aria-label="博客终端信息">
                <p class="home-terminal-path">~/mistisle/blog</p>
                <p class="home-terminal-command">ls posts --sort=date</p>
                <p class="home-terminal-summary" id="home-terminal-summary">loading entries...</p>
            </header>
            <div id="posts-container" class="article-list" aria-live="polite">
                <p class="loading-text">加载中...</p>
            </div>
        </main>

        <footer class="site-footer">
            <p class="footer-text">© 2026 · 版权所有</p>
        </footer>
    </div>
</body>
</html>
